name: vidyank
description: Vidyank learning platform mobile app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  provider: ^6.1.5
  go_router: ^16.0.0
  cached_network_image: ^3.4.1
  video_player: ^2.10.0
  video_thumbnail: ^0.5.6
  path_provider: ^2.1.5
  chewie: ^1.12.1
  flutter_secure_storage: ^9.2.4
  intl: ^0.20.2
  webview_flutter: ^4.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/blureBanner.png
    - assets/images/banners/
    - assets/images/banners/physics_banner.webp
    - assets/images/banners/courses_banner.webp
    - assets/images/banners/it_courses_banner.webp
    - assets/images/banners/skillcoursesIcon.png
    - assets/images/banners/videoEditingIcon.webp
    - assets/images/categories/
